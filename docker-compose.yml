services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lorax
      POSTGRES_PASSWORD: lorax
      POSTGRES_DB: loraxhub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://lorax:lorax@postgres:5432/loraxhub?schema=public
      JWT_SECRET: replace-with-a-long-random-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: 123456Dinh
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  postgres-data:
